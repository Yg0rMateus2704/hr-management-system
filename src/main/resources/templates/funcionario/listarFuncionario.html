<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>App RH</title>

    <!-- Bootstrap -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">App RH</a>

            <div class="collapse navbar-collapse">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/funcionarios">Funcionários</a></li>
                    <li class="nav-item"><a class="nav-link" href="/cadastrarFuncionario">Cadastrar Funcionário</a></li>
                    <li class="nav-item"><a class="nav-link" href="/vagas">Listar Vagas</a></li>
                    <li class="nav-item"><a class="nav-link" href="/cadastrarVaga">Cadastrar Vaga</a></li>
                </ul>
            </div>
        </div>
    </nav>
</header>

<div class="container mt-4">

    <h1>Lista interna de funcionários</h1>

    <table class="table table-striped table-hover mt-3">
        <thead>
            <tr>
                <th>Nome</th>
                <th>Data de nascimento</th>
                <th>Email</th>
                <th>Ações</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="funcionario : ${funcionarios}">

                <!-- Nome -->
                <td>
                    <a th:href="@{/dependentes/{id}(id=${funcionario.id})}">
                        <span th:text="${funcionario.nome}"></span>
                    </a>
                </td>

                <!-- Data -->
                <td>
                    <span th:text="${funcionario.data}"></span>
                </td>

                <!-- Email -->
                <td>
                    <span th:text="${funcionario.email}"></span>
                </td>

                <!-- Ações -->
                <td>
                    <a th:href="@{/deletarFuncionario(id=${funcionario.id})}">
                        <button class="btn btn-danger btn-sm">Excluir</button>
                    </a>

                    <a th:href="@{/editar-funcionario(id=${funcionario.id})}">
                        <button class="btn btn-primary btn-sm">Editar</button>
                    </a>

                    <a th:href="@{/dependentes/{id}(id=${funcionario.id})}">
                        <button class="btn btn-success btn-sm">Dependentes</button>
                    </a>
                </td>

            </tr>
        </tbody>
    </table>

</div>

<footer class="bg-dark text-center text-light py-3 fixed-bottom">
    | App RH | © 2025
</footer>

</body>
</html>
